name: Release

on:
  push:
    branches:
      - main          # ← cambiá si usás otra rama principal
    paths:
      - 'src-tauri/tauri.conf.json'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lee la versión y crea el tag
  # ─────────────────────────────────────────
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      tag_created: ${{ steps.tag_check.outputs.exists == 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: v$VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist, will create."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed."

  # ─────────────────────────────────────────
  # JOB 2: Build & Release (depende del tag)
  # ─────────────────────────────────────────
  release:
    name: Build & Release (Windows)
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          cache-on-failure: true

      - name: Build and release app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.tag.outputs.tag }}
          releaseName: 'Nuevo Galeno ${{ needs.tag.outputs.tag }}'
          releaseBody: |
            🚀 Nueva versión de **Nuevo Galeno**
            Revisá el changelog para ver mejoras y correcciones.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}